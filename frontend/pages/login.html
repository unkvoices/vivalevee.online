<!doctype html>
<html lang="pt-pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entrar | Viva Leve</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/login.css" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link
      rel="shortcut icon"
      href="../assets/favicon.png"
      type="image/x-icon"
    />
  </head>
  <body>
    <!-- Fundo de Partículas Animadas -->
    <div class="particles-container">
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
    </div>

    <div class="auth-wrapper">
      <div class="auth-container">
        <header class="auth-header">
          <img src="../assets/favicon.png" alt="Logo" class="auth-logo" />
          <h1>VIVA<span>LEVE</span></h1>
        </header>

        <div class="auth-tabs">
          <button class="tab-btn active" data-target="login">Entrar</button>
          <button class="tab-btn" data-target="register">Criar Conta</button>
        </div>

        <!-- Formulário de Login -->
        <form id="login-form" class="auth-form active">
          <div class="input-field-group">
            <label for="login-email">E-mail</label>
            <input
              type="email"
              id="login-email"
              placeholder="Ex: joao@email.com"
              required
            />
          </div>
          <div class="input-field-group">
            <label for="login-password">Palavra-passe</label>
            <input
              type="password"
              id="login-password"
              placeholder="••••••••"
              required
            />
            <a href="#" id="forgot-password-link" class="auth-aux-link">
              Esqueci-me da palavra-passe?
            </a>
          </div>
          <button type="submit" class="btn-primary">Entrar no Painel</button>
        </form>

        <!-- Formulário de Registo -->
        <form id="register-form" class="auth-form">
          <div class="form-grid">
            <div class="input-field-group">
              <label for="reg-name">Nome Completo</label>
              <input
                type="text"
                id="reg-name"
                placeholder="Ex: António Manuel"
                required
              />
            </div>
            <div class="input-field-group">
              <label for="reg-username">Username</label>
              <input
                type="text"
                id="reg-username"
                placeholder="Ex: antoniomanuel"
                required
              />
            </div>
          </div>
          <div class="input-field-group">
            <label for="reg-email">E-mail</label>
            <input
              type="email"
              id="reg-email"
              placeholder="teu@email.com"
              required
            />
          </div>
          <div class="input-group">
            <label for="reg-country">País</label>
            <select id="reg-country" required>
              <option value="" disabled selected>Seleciona o teu país</option>
              <option value="MZ">🇲🇿 Moçambique</option>
              <option value="PT">🇵🇹 Portugal</option>
              <option value="BR">🇧🇷 Brasil</option>
              <option value="AO">🇦🇴 Angola</option>
              <option value="CP">🇨🇻 Cabo Verde</option>
              <!-- Adicionar mais conforme necessário -->
            </select>
          </div>
          <div class="input-group">
            <label for="reg-password">Palavra-passe</label>
            <input
              type="password"
              id="reg-password"
              placeholder="Mínimo 6 caracteres"
              required
            />
          </div>
          <button type="submit" class="btn-primary">Criar Conta</button>
        </form>

        <div class="auth-divider">
          <span>ou continuar com</span>
        </div>

        <button id="google-auth-btn" class="btn-google">
          <svg viewBox="0 0 48 48" width="20" height="20">
            <path
              fill="#EA4335"
              d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"
            />
            <path
              fill="#4285F4"
              d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"
            />
            <path
              fill="#FBBC05"
              d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24s.92 7.54 2.56 10.78l7.97-6.19z"
            />
            <path
              fill="#34A853"
              d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"
            />
          </svg>
          Google
        </button>

        <div id="auth-message" class="auth-message"></div>
      </div>
    </div>

    <!-- Firebase SDK Config (Importado do login.js) -->
    <script type="module" src="../js/login.js"></script>
  </body>
</html>
