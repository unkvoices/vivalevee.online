<!doctype html>
<html lang="pt-pt">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Acesso Premium | Viva Leve</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/login.css" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
  </head>
  <body class="auth-page">
    <main class="auth-container">
      <div class="auth-card">
        <!-- Tabs de Alternância -->
        <div class="auth-tabs">
          <button class="tab-btn active" data-target="login">Entrar</button>
          <button class="tab-btn" data-target="register">Criar Conta</button>
        </div>

        <!-- Área de Mensagens de Erro -->
        <div id="auth-message" class="error-message"></div>

        <!-- Formulário de Login -->
        <form id="login-form" class="auth-form active">
          <div class="input-group">
            <label for="login-email">E-mail</label>
            <input
              type="email"
              id="login-email"
              placeholder="teu@email.com"
              required
            />
          </div>
          <div class="input-group">
            <div class="label-row">
              <label for="login-password">Palavra-passe</label>
              <a href="#" id="forgot-password-link" class="helper-link"
                >Esqueci-me?</a
              >
            </div>
            <input
              type="password"
              id="login-password"
              placeholder="••••••••"
              required
            />
          </div>
          <button type="submit" class="btn-primary">Entrar no Painel</button>
        </form>

        <!-- Formulário de Registo -->
        <form id="register-form" class="auth-form">
          <div class="input-group">
            <label for="reg-name">Nome Completo</label>
            <input
              type="text"
              id="reg-name"
              placeholder="Ex: João Silva"
              required
            />
          </div>
          <div class="input-group">
            <label for="reg-username">Username único</label>
            <input
              type="text"
              id="reg-username"
              placeholder="Ex: viva.premium"
              required
            />
          </div>
          <div class="input-group">
            <label for="reg-email">E-mail</label>
            <input
              type="email"
              id="reg-email"
              placeholder="teu@email.com"
              required
            />
          </div>
          <div class="input-group">
            <label for="reg-country">País</label>
            <select id="reg-country" class="custom-select" required>
              <option value="MZ">🇲🇿 Moçambique</option>
              <option value="PT">🇵🇹 Portugal</option>
              <option value="BR">🇧🇷 Brasil</option>
              <option value="AO">🇦🇴 Angola</option>
              <option value="CV">🇨🇻 Cabo Verde</option>
            </select>
          </div>
          <div class="input-group">
            <label for="reg-password">Palavra-passe</label>
            <input
              type="password"
              id="reg-password"
              placeholder="Mínimo 6 caracteres"
              required
            />
          </div>
          <button type="submit" class="btn-primary">Finalizar Registo</button>
        </form>

        <!-- Divisor Social -->
        <div class="social-divider">
          <span>ou continuar com</span>
        </div>

        <!-- Login Social -->
        <button id="google-auth-btn" class="btn-social">
          <svg width="20" height="20" viewBox="0 0 24 24">
            <path
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              fill="#4285F4"
            />
            <path
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              fill="#34A853"
            />
            <path
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
              fill="#FBBC05"
            />
            <path
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
              fill="#EA4335"
            />
          </svg>
          Aceder com Google
        </button>
      </div>
    </main>
    <script type="module" src="../js/login.js"></script>
  </body>
</html>
