<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viva Leve Saúde Bem-Estar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="frontend/assets/favicon.png">
    <link rel="stylesheet" href="style.css">
    <!-- Phosphor Icons para ícones minimalistas -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <header class="main-header">
        <nav class="header-nav">
            <!-- 1. Botão Mobile -->
            <button class="menu-toggle" aria-label="Abrir Menu">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>

            <!-- 2. Logo -->
            <a href="/" class="logo">
                <img src="frontend/assets/favicon.png" alt="Viva Leve Logo">
            </a>

            <!-- 3. Links Desktop -->
            <ul class="nav-links hide-mobile">
                <li><a href="#" class="nav-link">Livros</a></li>
                <li><a href="#" class="nav-link">Alimentação & Hábitos</a></li>
                <li><a href="#" class="nav-link">Saúde & Bem-estar</a></li>
            </ul>

            <!-- 4. Ações (Direita) -->
            <div class="header-actions">
                <i class="ph ph-magnifying-glass action-icon"></i>
                <i class="ph ph-user action-icon hide-mobile"></i>
                <div class="cart-wrapper">
                    <i class="ph ph-shopping-bag action-icon"></i>
                    <span id="cart-count">0</span>
                </div>
                <button class="btn-support hide-mobile">APOIAR</button>
            </div>
        </nav>
    </header>

    <main>
        <!-- Seção Hero para visualização do cabeçalho sobreposto -->
        <section class="hero-section">
            <div class="hero-overlay"></div>
            <div class="container hero-content">
                <h1>BEM-VINDO À VIVA LEVE <br>SAÚDE E BEM-ESTAR!</h1>
                <p>Encontre a clareza necessária para transformar a sua rotina.</p>
            </div>
        </section>

        <section class="filters container">
            <button class="filter-btn active" data-category="all">Todos</button>
            <button class="filter-btn" data-category="Filosofia">Filosofia</button>
            <button class="filter-btn" data-category="Produtividade">Produtividade</button>
            <button class="filter-btn" data-category="Saúde">Saúde</button>
        </section>

        <section class="products container">
            <div id="books-grid" class="books-grid">
                <!-- Injetado via JS -->
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <p>&copy; 2024 Viva Leve - Cientista da Própria Vida.</p>
    </footer>

    <script src="./frontend/js/app.js"></script>
    <script src="./frontend/js/script.js"></script>
</body>
</html>
